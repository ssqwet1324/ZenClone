basePath: /api
definitions:
  entity.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  entity.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/entity.ErrorDetail'
    type: object
  entity.LoginResponse:
    properties:
      access_token:
        type: string
      id:
        type: string
      refresh_token:
        type: string
    type: object
  entity.LoginUserInfo:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  entity.RefreshResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  entity.RegisterRequest:
    properties:
      bio:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      login:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  entity.RegisterResponse:
    properties:
      access_token:
        type: string
      id:
        type: string
      refresh_token:
        type: string
    type: object
  entity.TokenRequest:
    properties:
      id:
        type: string
      refresh_token:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Сервис аутентификации и регистрации пользователей
  title: Auth Service API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Аутентификация пользователя по логину и паролю, возвращает access
        и refresh токены
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/entity.LoginUserInfo'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный вход, выданы токены
          schema:
            $ref: '#/definitions/entity.LoginResponse'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
        "401":
          description: Неверный логин или пароль
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Обновляет access и refresh токены по текущему access токену и refresh
        токену
      parameters:
      - default: Bearer
        description: Bearer токен (текущий access token)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Данные для обновления токенов
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/entity.TokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Токены успешно обновлены
          schema:
            $ref: '#/definitions/entity.RefreshResponse'
        "400":
          description: Некорректный запрос или отсутствует заголовок Authorization
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
        "401":
          description: Невалидный/просроченный токен или refresh token не найден
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
      summary: Обновление access и refresh токенов
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и возвращает access и refresh токены
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/entity.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь успешно зарегистрирован
          schema:
            $ref: '#/definitions/entity.RegisterResponse'
        "400":
          description: Некорректный запрос
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/entity.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - auth
swagger: "2.0"
